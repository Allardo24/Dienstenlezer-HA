name: Controleer Home Assistant-app

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Repository ophalen
        uses: actions/checkout@v6.0.2

      - name: Appconfiguratie controleren
        uses: frenck/action-addon-linter@v2.21
        with:
          path: ./dienstenlezer
